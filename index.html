<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProxyScope</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>ProxyScope</h1>
        <span id="core-version" class="app__version">connecting…</span>
      </header>

      <section class="panel">
        <textarea
          id="input"
          class="input"
          spellcheck="false"
          placeholder="Paste proxies, one per line:&#10;1.2.3.4:8080&#10;1.2.3.4:8080:user:pass&#10;socks5://user:pass@host:1080&#10;tg://proxy?server=...&port=...&secret=..."
        ></textarea>

        <div class="controls">
          <button id="start" class="btn btn--primary" type="button">Check proxies</button>
          <label class="btn btn--file">
            Import file…
            <input id="file" type="file" accept=".txt,.csv,.list,text/plain" hidden />
          </label>
          <label class="opt">
            <input id="rotation" type="checkbox" />
            Detect rotation
          </label>
          <label class="opt">
            samples
            <input id="samples" type="number" min="2" max="20" value="4" />
          </label>
          <span id="status" class="status"></span>
        </div>

        <details class="settings">
          <summary>Settings</summary>
          <div class="settings__grid">
            <label>
              Judge URL
              <input id="set-judge" type="text" placeholder="http://httpbin.org/get" />
            </label>
            <label>
              Concurrency
              <input id="set-concurrency" type="number" min="1" max="1024" value="64" />
            </label>
            <label>
              Connect timeout (s)
              <input id="set-connect" type="number" min="1" max="120" value="10" />
            </label>
            <label>
              Request timeout (s)
              <input id="set-request" type="number" min="1" max="120" value="15" />
            </label>
            <label class="settings__wide">
              GeoLite2 database path (optional)
              <input id="set-geolite" type="text" placeholder="C:\\path\\to\\GeoLite2-City.mmdb" />
            </label>
            <label class="opt">
              <input id="set-http-geoip" type="checkbox" checked />
              Allow HTTP GeoIP fallback (ip-api.com)
            </label>
          </div>
        </details>

        <div class="progress" id="progress-wrap" hidden>
          <div class="progress__bar" id="progress-bar"></div>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <input id="filter" class="filter" type="search" placeholder="Filter by proxy, IP, country…" />
          <select id="status-filter" class="filter">
            <option value="all">All</option>
            <option value="alive">Alive</option>
            <option value="dead">Dead</option>
          </select>
          <span id="counts" class="counts"></span>
          <span class="toolbar__spacer"></span>
          <button id="export-csv" class="btn" type="button">Export CSV</button>
          <button id="export-json" class="btn" type="button">Export JSON</button>
        </div>

        <div class="toolbar toolbar--export">
          <label class="opt">
            Format
            <select id="proxy-format">
              <option value="hostport">host:port</option>
              <option value="hostportauth">host:port:user:pass</option>
              <option value="scheme">scheme://user:pass@host:port</option>
              <option value="authhost">user:pass@host:port</option>
            </select>
          </label>
          <button id="copy-selected" class="btn" type="button">Copy selected</button>
          <button id="export-selected" class="btn" type="button">Export selected</button>
          <button id="export-alive" class="btn" type="button">Export alive</button>
          <span id="select-info" class="counts"></span>
        </div>

        <div class="table-wrap">
          <table class="results">
            <thead>
              <tr id="head-row"></tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
          <p id="empty" class="empty">No results yet. Paste proxies and click “Check proxies”.</p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
